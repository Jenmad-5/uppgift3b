<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Supportformulär</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Supportformulär</h1>
<p>Här kan du skicka ett ärende till vår supportavdelning.</p>

<form action="#" method="post" class="support-form">

    <label>Ditt namn:<br>
        <input type="text" name="namn">
    </label><br><br>

    <label>Telefon:<br>
        <input type="text" name="telefon">
    </label><br><br>

    <label>Prioritet:<br>
        <select name="prioritet">
            <option>Låg</option>
            <option>Medel</option>
            <option>Hög</option>
        </select>
    </label><br><br>

    <label>Tilldela till ort:</label><br>
    <label><input type="radio" name="ort" value="Göteborg" checked> Göteborg</label><br>
    <label><input type="radio" name="ort" value="Stockholm"> Stockholm</label><br>
    <label><input type="radio" name="ort" value="Umeå"> Umeå</label><br>
    <label><input type="radio" name="ort" value="Luleå"> Luleå</label><br><br>

    <label>Kategori:<br>
        <select name="kategori">
            <option>Fakturering</option>
            <option>Support</option>
            <option>Telefoni</option>
            <option>Övrigt</option>
        </select>
    </label><br><br>

    <label>Rubrik:<br>
        <input type="text" name="rubrik">
    </label><br><br>

    <label>Beskrivning<br>
        <textarea name="beskrivning" rows="7" cols="50"></textarea>
    </label><br><br>

    <button type="submit">Submit</button>
    <button type="reset">Reset</button>

</form>

<hr><br>
</body>
</html>
